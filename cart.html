<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Shopping Cart | Ashtami Store</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght=500;600;700&family=Poppins:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="responsive.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        /*=========================================================
        THEME RESET & CONFIGURATION MATCHING THE CATEGORY PAGE
        =========================================================*/
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #111412;
            color: #c9d1cc;
            line-height: 1.7;
        }

        :root {
            --primary: #0a2e1c;
            --secondary: #d4af37;
            --accent: #9e2a2b;
            --card-bg: #1a201c;
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f4f7f5;
            --text-muted: #a0aba4;
            --shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            --transition: all 0.3s ease;
        }

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /*=========================================================
        HEADER STYLING
        =========================================================*/
        .top-bar {
            background: #090c0a;
            color: var(--text-main);
            padding: 12px;
            text-align: center;
            font-size: 15px;
            letter-spacing: .5px;
            border-bottom: 1px solid var(--border-color);
        }

        header {
            position: sticky;
            top: 0;
            background: #161b18;
            border-bottom: 1px solid var(--border-color);
            z-index: 1000;
            box-shadow: var(--shadow);
            padding: 15px 0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--secondary);
        }

        nav ul {
            display: flex;
            align-items: center;
            gap: 30px;
            list-style: none;
        }

        nav ul li a {
            font-size: 0.95rem;
            color: var(--text-main);
            text-decoration: none;
            transition: var(--transition);
        }

        nav ul li a:hover {
            color: var(--secondary);
        }

        .cart-icon {
            position: relative;
        }

        .cart-count {
            position: absolute;
            top: -8px;
            right: -12px;
            background: var(--accent);
            color: var(--text-main);
            font-size: 0.7rem;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .menu-toggle {
            display: none;
            font-size: 1.4rem;
            cursor: pointer;
            color: var(--text-main);
        }

        /*=========================================================
        CART & CHECKOUT TABLE WORKSPACE
        =========================================================*/
        .cart-section {
            padding: 80px 0;
        }

        .cart-section h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 42px;
            margin-bottom: 40px;
            color: var(--text-main);
            text-align: center;
        }

        .cart-table-wrapper {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: var(--shadow);
            margin-bottom: 40px;
            overflow-x: auto;
        }

        .cart-table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        .cart-table th {
            border-bottom: 2px solid var(--border-color);
            padding: 15px;
            color: var(--secondary);
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
        }

        .cart-table td {
            padding: 20px 15px;
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }

        .product-title {
            font-weight: 600;
            color: var(--text-main);
        }

        .product-meta {
            font-size: 13px;
            color: var(--text-muted);
        }

        .qty-input {
            width: 70px;
            padding: 8px;
            background: #111412;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-main);
            text-align: center;
            outline: none;
        }

        .qty-input:focus {
            border-color: var(--secondary);
        }

        .remove-btn {
            background: transparent;
            border: none;
            color: var(--accent);
            cursor: pointer;
            font-size: 16px;
            transition: var(--transition);
        }

        .remove-btn:hover {
            color: #d9383a;
            transform: scale(1.1);
        }

        /* Summary Footer Area with Flex Columns */
        .cart-summary-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .grand-total-text {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            color: var(--text-main);
        }

        .grand-total-amount {
            color: var(--secondary);
            font-weight: 700;
        }

        /* Group actions alignment */
        .cart-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 14px 30px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: var(--transition);
            border: none;
            font-size: 0.95rem;
        }

        .btn-primary {
            background: var(--secondary);
            color: #111412;
        }

        .btn-primary:hover {
            background: #bd9a2d;
            transform: translateY(-2px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-main);
            border: 2px solid var(--border-color);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--secondary);
            transform: translateY(-2px);
        }

        .empty-message {
            text-align: center;
            padding: 60px 0;
        }

        .empty-message i {
            font-size: 60px;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        .empty-message p {
            font-size: 18px;
            margin-bottom: 30px;
        }

        /*=========================================================
        RESPONSIVE ENGINE
        =========================================================*/
        @media screen and (max-width: 991px) {
            .menu-toggle { display: block; }
            nav {
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background: #161b18;
                display: none;
                border-bottom: 1px solid var(--border-color);
                padding: 20px 0;
            }
            nav.active { display: block; }
            nav ul { flex-direction: column; width: 90%; margin: 0 auto; align-items: flex-start; }
            
            .cart-summary-box { 
                flex-direction: column; 
                align-items: stretch; 
                text-align: center; 
                gap: 20px; 
                padding: 25px 20px;
            }
            
            .cart-actions {
                flex-direction: column;
                width: 100%;
            }

            .btn { width: 100%; }
        }
    </style>
</head>

<body>
    <div class="top-bar">
        Traditional Taste, Style and Smile Delivered
    </div>

    <header>
        <div class="container navbar">
            <div class="logo">ASHTAMI STORE</div>
            <nav id="nav-menu">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="category.html">Collections</a></li>
                    <li><a href="about.html">About</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li>
                        <a href="cart.html" class="cart-icon">
                            <i class="fa-solid fa-cart-shopping"></i>
                            <span class="cart-count" id="global-cart-count">0</span>
                        </a>
                    </li>
                </ul>
            </nav>
            <div class="menu-toggle" id="mobile-toggle">
                <i class="fa-solid fa-bars"></i>
            </div>
        </div>
    </header>

    <section class="cart-section">
        <div class="container">
            <h1>Your Shopping Cart</h1>

            <!-- Dynamic Checkout Workspace -->
            <div id="cart-workspace">
                <!-- Data injected via Javascript -->
            </div>
        </div>
    </section>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mobile Hamburger menu listener
            const mobileToggle = document.getElementById('mobile-toggle');
            const navMenu = document.getElementById('nav-menu');
            if (mobileToggle && navMenu) {
                mobileToggle.addEventListener('click', () => {
                    navMenu.classList.toggle('active');
                });
            }

            // Load and draw standard items layout
            renderCartWorkspace();
        });

        // Main calculations and visual builder function
        function renderCartWorkspace() {
            const workspace = document.getElementById('cart-workspace');
            const cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            
            // First Sync Global Header Counter Badge
            updateCartCountHeader(cartItems);

            if (cartItems.length === 0) {
                workspace.innerHTML = `
                    <div class="empty-message">
                        <i class="fa-solid fa-basket-shopping"></i>
                        <p>Your shopping cart is currently empty!</p>
                        <a href="category.html" class="btn btn-primary">Continue Shopping</a>
                    </div>
                `;
                return;
            }

            let tableRowsHtml = '';
            let checkoutGrandTotal = 0;

            // Loop through all saved array items dynamically
            cartItems.forEach((item, index) => {
                const itemQuantity = parseInt(item.quantity) || 1;
                const itemUnitPrice = parseFloat(item.price) || 0;
                const lineSubtotal = itemUnitPrice * itemQuantity;
                
                checkoutGrandTotal += lineSubtotal;

                tableRowsHtml += `
                    <tr>
                        <td>
                            <div class="product-title">${item.name}</div>
                            <div class="product-meta">Option: ${item.variant}</div>
                        </td>
                        <td>₹${itemUnitPrice}</td>
                        <td>
                            <input 
                                type="number" 
                                class="qty-input" 
                                value="${itemQuantity}" 
                                min="1" 
                                max="20" 
                                onchange="updateCartQuantity(${index}, this.value)"
                                oninput="updateCartQuantity(${index}, this.value)"
                            >
                        </td>
                        <td style="font-weight: 600; color: #f4f7f5;">₹${lineSubtotal}</td>
                        <td style="text-align: right;">
                            <button class="remove-btn" onclick="removeItemFromCart(${index})">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            // Re-render complete parent framework structure with Secure Checkout + WhatsApp options
            workspace.innerHTML = `
                <div class="cart-table-wrapper">
                    <table class="cart-table">
                        <thead>
                            <tr>
                                <th>Product</th>
                                <th>Price</th>
                                <th>Quantity</th>
                                <th>Total</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            ${tableRowsHtml}
                        </tbody>
                    </table>
                </div>

                <div class="cart-summary-box">
                    <div class="grand-total-text">
                        Grand Total: <span class="grand-total-amount">₹${checkoutGrandTotal}</span>
                    </div>
                    <div class="cart-actions">
                        <!-- Direct Link to checkout.html -->
                        <a href="checkout.html" class="btn btn-primary">
                            <i class="fa-solid fa-lock"></i> Secure Checkout
                        </a>
                        <!-- WhatsApp Option -->
                        <a href="https://wa.me/916393072915" target="_blank" class="btn btn-secondary">
                            <i class="fa-brands fa-whatsapp"></i> Order via WhatsApp
                        </a>
                    </div>
                </div>
            `;
        }

        // Live quantity alteration computation handling function
        function updateCartQuantity(index, newQuantityValue) {
            let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            let parsedQty = parseInt(newQuantityValue);

            // Keep configuration range clean between 1 and 20
            if (isNaN(parsedQty) || parsedQty < 1) {
                parsedQty = 1;
            }

            // Save the newly modified quantity data point into local storage array
            cartItems[index].quantity = parsedQty;
            localStorage.setItem('cart', JSON.stringify(cartItems));

            // IMMEDIATELY re-run UI builder to change lines sub-totals and grand total instantly
            renderCartWorkspace();
        }

        // Action block workflow configuration to clear out standard objects row index
        function removeItemFromCart(index) {
            let cartItems = JSON.parse(localStorage.getItem('cart')) || [];
            cartItems.splice(index, 1);
            localStorage.setItem('cart', JSON.stringify(cartItems));
            
            // Instant canvas refresh
            renderCartWorkspace();
        }

        // Synchronize display of the global shopping counter element badge 
        function updateCartCountHeader(cartItemsArray) {
            const items = cartItemsArray || JSON.parse(localStorage.getItem('cart')) || [];
            const totalCount = items.reduce((sum, item) => sum + (parseInt(item.quantity) || 1), 0);
            const cartBadge = document.getElementById('global-cart-count');
            if (cartBadge) {
                cartBadge.textContent = totalCount;
            }
        }
    </script>
</body>
</html>
